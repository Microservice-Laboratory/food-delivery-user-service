name: ci-user-service

on:
  workflow_dispatch:
  pull_request:
    branches: ["develop"]

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.0"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test
        run: |
          go clean -testcache
          go test ./... -coverprofile=coverage.out -coverpkg=./...
